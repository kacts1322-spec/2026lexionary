<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성서정과 2026 | 매일 묵상</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
    <!-- 인증 화면 (Glassmorphism) -->
    <div id="auth-screen" class="screen">
        <div class="auth-container">
            <h1>성서정과 2026</h1>
            <p>오늘의 말씀을 만나기 위해<br>비밀번호를 입력해 주세요</p>
            <input type="password" id="password-input" placeholder="••••" autofocus maxlength="4" inputmode="numeric">
            <button id="login-button">입장하기</button>
        </div>
    </div>

    <!-- 메인 화면 -->
    <div id="main-screen" class="screen hidden">
        <header>
            <div class="logo-area">
                <h1>성서정과 <span style="font-weight: 300;">2026</span></h1>
            </div>
            <button id="today-button">오늘말씀</button>
        </header>

        <main class="container">
            <!-- 왼쪽: 달력 섹션 -->
            <aside class="calendar-section">
                <div class="calendar-header">
                    <button id="prev-month" aria-label="이전 달">←</button>
                    <h2 id="current-month-display">2026년 1월</h2>
                    <button id="next-month" aria-label="다음 달">→</button>
                </div>
                <div id="calendar-grid" class="calendar-grid">
                    <div class="weekday sun">일</div>
                    <div class="weekday">월</div>
                    <div class="weekday">화</div>
                    <div class="weekday">수</div>
                    <div class="weekday">목</div>
                    <div class="weekday">금</div>
                    <div class="weekday sat">토</div>
                </div>
            </aside>

            <!-- 오른쪽: 본문 섹션 -->
            <article class="content-section">
                <header class="content-header">
                    <div id="selected-date-display">
                        <h3>2026년 1월 1일 (목)</h3>
                        <p class="season-info">새해</p>
                    </div>
                </header>

                <div id="bible-cards-container">
                    <!-- 말씀 카드가 여기에 동적으로 생성됩니다 -->
                </div>
            </article>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
